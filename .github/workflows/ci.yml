name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Alire
        uses: alire-project/setup-alire@v3
        with:
          cache: true

      - name: Build library
        run: alr build

      - name: Build tests
        run: alr exec -- gprbuild -P test_cbor.gpr -p

      - name: Run tests
        run: ./bin/test_cbor

  prove:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Alire
        uses: alire-project/setup-alire@v3
        with:
          cache: true

      - name: Add gnatprove
        run: alr with gnatprove

      - name: Run SPARK proofs (core packages)
        run: alr exec -- gnatprove -P cbor_ada.gpr -j0 --level=2 --timeout=30 -u cbor-encoding.adb -u cbor-decoding.adb

      - name: Show proof summary
        if: always()
        run: |
          if [ -f obj/gnatprove/gnatprove.out ]; then
            cat obj/gnatprove/gnatprove.out
          fi

      - name: Fail on unproved checks
        run: |
          if grep -q "Unproved" obj/gnatprove/gnatprove.out 2>/dev/null; then
            unproved=$(grep "^Total" obj/gnatprove/gnatprove.out | grep -oP '\d+(?= \(\d+%\)$)' || echo "")
            if [ -n "$unproved" ] && [ "$unproved" != "0" ]; then
              echo "::error::SPARK proof has unproved checks"
              exit 1
            fi
          fi
